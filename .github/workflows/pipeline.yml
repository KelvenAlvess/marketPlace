name: Marketplace CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  test-integration:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Subir Infraestrutura (Postgres e RabbitMQ)

        run: |
          docker-compose up -d postgres rabbitmq
          echo "Aguardando os serviços iniciarem..."
          sleep 15 

      - name: Configurar Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Rodar Testes do Spring Boot
        working-directory: ./backend

        run: mvn clean test
        env:

          DB_NAME: marketplace
          DB_USER: admin
          DB_PASSWORD: password
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/marketplace
          SPRING_DATASOURCE_USERNAME: admin
          SPRING_DATASOURCE_PASSWORD: password
          RABBITMQ_HOST: localhost
          RABBITMQ_USER: guest
          RABBITMQ_PASS: guest
          JWT_SECRET: segredodeteste12345678901234567890
          JWT_EXPIRATION: 3600000

      - name: Derrubar Infraestrutura
        if: always()
        run: docker-compose down

  deploy-backend:
    name: Deploy Backend (Render)
    needs: test-integration
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Disparar Webhook do Render

        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}


  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: test-integration
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        working-directory: ./frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build do Projeto Frontend
        working-directory: ./frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy no Vercel
        working-directory: ./frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}+